<!doctype html>

<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-container": "#bc4800",
              "surface-dim": "#cbdbf5",
              "on-primary-fixed-variant": "#003ea8",
              "surface-container-lowest": "#ffffff",
              "on-secondary": "#ffffff",
              "secondary-container": "#645efb",
              "on-tertiary-fixed": "#360f00",
              "tertiary-fixed": "#ffdbcd",
              "surface-container-highest": "#d3e4fe",
              "on-error": "#ffffff",
              "primary-fixed": "#dbe1ff",
              "on-primary-container": "#eeefff",
              "on-secondary-container": "#fffbff",
              background: "#f8f9ff",
              "secondary-fixed": "#e2dfff",
              outline: "#737686",
              "on-secondary-fixed-variant": "#3323cc",
              "inverse-on-surface": "#eaf1ff",
              secondary: "#4b41e1",
              "on-tertiary": "#ffffff",
              "on-primary-fixed": "#00174b",
              error: "#ba1a1a",
              "on-surface": "#0b1c30",
              "surface-tint": "#0053db",
              surface: "#f8f9ff",
              "surface-container": "#e5eeff",
              "primary-fixed-dim": "#b4c5ff",
              "secondary-fixed-dim": "#c3c0ff",
              "on-secondary-fixed": "#0f0069",
              "outline-variant": "#c3c6d7",
              "on-error-container": "#93000a",
              "on-background": "#0b1c30",
              primary: "#004ac6",
              "surface-container-high": "#dce9ff",
              "surface-container-low": "#eff4ff",
              "surface-bright": "#f8f9ff",
              "on-primary": "#ffffff",
              tertiary: "#943700",
              "tertiary-fixed-dim": "#ffb596",
              "inverse-surface": "#213145",
              "surface-variant": "#d3e4fe",
              "on-tertiary-container": "#ffede6",
              "error-container": "#ffdad6",
              "on-tertiary-fixed-variant": "#7d2d00",
              "primary-container": "#2563eb",
              "on-surface-variant": "#434655",
              "inverse-primary": "#b4c5ff",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              md: "16px",
              "admin-gap": "16px",
              sm: "8px",
              xl: "32px",
              "2xl": "48px",
              "container-max-width": "1280px",
              "student-gap": "24px",
              lg: "24px",
              xs: "4px",
              unit: "4px",
            },
            fontFamily: {
              "body-student": ["Inter"],
              "headline-student": ["Inter"],
              "body-admin": ["Inter"],
              "display-exam": ["Inter"],
              "headline-admin": ["Inter"],
              "label-bold": ["Inter"],
              "label-sm": ["Inter"],
              caption: ["Inter"],
            },
            fontSize: {
              "body-student": [
                "18px",
                { lineHeight: "28px", fontWeight: "400" },
              ],
              "headline-student": [
                "24px",
                { lineHeight: "32px", fontWeight: "600" },
              ],
              "body-admin": ["14px", { lineHeight: "20px", fontWeight: "400" }],
              "display-exam": [
                "30px",
                {
                  lineHeight: "38px",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              "headline-admin": [
                "20px",
                { lineHeight: "28px", fontWeight: "600" },
              ],
              "label-bold": [
                "14px",
                {
                  lineHeight: "20px",
                  letterSpacing: "0.01em",
                  fontWeight: "600",
                },
              ],
              "label-sm": ["12px", { lineHeight: "16px", fontWeight: "500" }],
              caption: ["12px", { lineHeight: "16px", fontWeight: "400" }],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
        display: inline-block;
        line-height: 1;
        text-transform: none;
        letter-spacing: normal;
        word-wrap: normal;
        white-space: nowrap;
        direction: ltr;
      }
      body {
        background-color: #f8fafc; /* slate-50 equivalent */
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-lg font-body-student text-on-surface"
  >
    <main class="w-full max-w-[440px] flex flex-col items-center">
      <!-- Logo Section -->
      <div class="mb-xl flex flex-col items-center gap-sm">
        <div
          class="w-16 h-16 bg-surface-container-high rounded-xl flex items-center justify-center shadow-sm overflow-hidden border border-outline-variant"
        >
          <img
            alt="School Logo"
            class="w-12 h-12 object-contain"
            data-alt="A clean, professional minimalist school crest or emblem presented as a vector logo. The design features sharp geometric lines and a scholarly book icon in the center, utilizing a primary blue and white color palette. The background is a crisp, bright white that fits perfectly within a modern educational dashboard interface, exuding a sense of institutional authority and academic excellence."
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuCI4YKeJIozbGzv1Czx2m8UXvTFMsUKm0LP4ggsJWS2J8Dp3HYgUcZXtu2N8SDONJkRZ0hDxAmXr74AOpXAZZg8r--IAX65iqTE46pE36L4GlOs6rjV_6ZM2cdiGiKXsYCzqCf_eZQJ3jkXrnmh8xgS1sIUjEp5-5ENin3la6pekS7vkMy8UTFSrVxGsDHY5JvTQEJOcQS9y24AsFXwt5ZNK4JyVAFQMFCmwADk4GXYDe-MCGcaEstuK79TkWl6oJDxh7mTnEbyBTUs"
          />
        </div>
        <h2 class="font-headline-student text-headline-student text-primary">
          CBT Mandiri
        </h2>
      </div>
      <!-- Login Card -->
      <div
        class="w-full bg-surface-container-lowest rounded-xl p-xl shadow-sm border border-outline-variant"
      >
        <div class="mb-xl">
          <h1 class="font-display-exam text-display-exam text-on-surface mb-xs">
            Selamat Datang
          </h1>
          <p class="font-body-student text-on-surface-variant text-[16px]">
            Silakan masuk ke akun siswa Kamu untuk memulai ujian.
          </p>
        </div>
        <form action="#" class="flex flex-col gap-lg" method="POST">
          <!-- Username Field -->
          <div class="flex flex-col gap-xs">
            <label
              class="font-label-bold text-label-bold text-on-surface-variant px-1"
              for="username"
              >Username</label
            >
            <div class="relative group">
              <div
                class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline"
              >
                <span class="material-symbols-outlined" data-icon="person"
                  >person</span
                >
              </div>
              <input
                class="w-full h-14 pl-[52px] pr-md bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-student placeholder:text-outline"
                id="username"
                name="username"
                placeholder="Masukkan nomor induk siswa"
                required=""
                type="text"
              />
            </div>
          </div>
          <!-- Password Field -->
          <div class="flex flex-col gap-xs">
            <div class="flex justify-between items-center px-1">
              <label
                class="font-label-bold text-label-bold text-on-surface-variant"
                for="password"
                >Password</label
              >
              <a
                class="font-label-sm text-label-sm text-primary hover:underline"
                href="#"
                >Lupa password?</a
              >
            </div>
            <div class="relative group">
              <div
                class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline"
              >
                <span class="material-symbols-outlined" data-icon="lock"
                  >lock</span
                >
              </div>
              <input
                class="w-full h-14 pl-[52px] pr-md bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-student placeholder:text-outline"
                id="password"
                name="password"
                placeholder="••••••••"
                required=""
                type="password"
              />
              <button
                class="absolute inset-y-0 right-0 pr-md flex items-center text-outline hover:text-on-surface transition-colors"
                type="button"
              >
                <span class="material-symbols-outlined" data-icon="visibility"
                  >visibility</span
                >
              </button>
            </div>
          </div>
          <!-- Login Button -->
          <button
            class="w-full h-14 bg-primary text-on-primary font-label-bold text-headline-admin rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm mt-md"
            type="submit"
          >
            Masuk Sekarang
            <span class="material-symbols-outlined" data-icon="login"
              >login</span
            >
          </button>
        </form>
        <!-- Footer Help -->
        <div class="mt-xl pt-xl border-t border-outline-variant text-center">
          <p class="font-caption text-caption text-on-surface-variant">
            Butuh bantuan? Hubungi
            <span class="text-primary font-medium">Administrator Sekolah</span>
          </p>
        </div>
      </div>
      <!-- Branding / Compliance -->
      <div class="mt-lg flex flex-col items-center gap-xs opacity-60">
        <p class="font-label-sm text-label-sm text-on-surface-variant">
          Versi 2.4.0 • Powered by CBT Admin
        </p>
        <div class="flex items-center gap-sm">
          <span
            class="material-symbols-outlined text-[16px]"
            data-icon="verified_user"
            >verified_user</span
          >
          <span class="font-caption text-caption"
            >Sistem Ujian Terverifikasi</span
          >
        </div>
      </div>
    </main>
    <!-- Decorative Elements (Subtle) -->
    <div class="fixed top-0 left-0 w-full h-1 bg-primary"></div>
    <div
      class="fixed -z-10 bottom-0 left-0 w-64 h-64 bg-primary/5 rounded-full blur-3xl -mb-32 -ml-32"
    ></div>
    <div
      class="fixed -z-10 top-0 right-0 w-96 h-96 bg-secondary/5 rounded-full blur-3xl -mt-48 -mr-48"
    ></div>
  </body>
</html>
